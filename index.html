<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meme Browser</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <h1>Meme Browser</h1>

  <input type="text" id="searchInput" placeholder="Search memes here..." />
  
  <button id="themeToggle">Dark Mode</button>
  <div id="categories">
    <button data-cat="all">All</button>
    <button data-cat="classic">Classic</button>
    <button data-cat="funny">Funny</button>
  </div>

  <div id="memeGrid"></div>
  <button id="topBtn">⬆ Top</button>

  <script src="script.js"></script>
</body>
</html>
